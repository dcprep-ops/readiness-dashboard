<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="1200" height="630" fill="#0d9488"/>

  <!-- subtle inner card -->
  <rect x="60" y="60" width="1080" height="510" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- chalkboard illustration (right side) -->
  <rect x="780" y="130" width="310" height="220" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- chalk tray -->
  <rect x="780" y="322" width="310" height="28" rx="0" fill="rgba(255,255,255,0.1)"/>
  <!-- chalk lines -->
  <line x1="808" y1="178" x2="920" y2="178" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".8"/>
  <line x1="808" y1="210" x2="980" y2="210" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".55"/>
  <line x1="808" y1="242" x2="900" y2="242" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".55"/>
  <line x1="808" y1="274" x2="950" y2="274" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".4"/>
  <!-- check circle -->
  <circle cx="1030" cy="192" r="52" fill="#fff" opacity=".2"/>
  <circle cx="1030" cy="192" r="40" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="3"/>
  <polyline points="1010,192 1025,207 1052,174" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- text block (left side) -->
  <text x="108" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="4">DC PREP</text>

  <text x="108" y="300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="88" font-weight="700" fill="#fff">BOY</text>

  <text x="108" y="390" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="64" font-weight="700" fill="#fff">Classroom</text>

  <text x="108" y="466" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="64" font-weight="700" fill="#fff">Readiness</text>

  <text x="108" y="522" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.5)">SY 2026–27</text>
</svg>
